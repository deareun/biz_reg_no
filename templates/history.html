<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏢 조회 이력</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: #ffffff;
      --foreground: #1a1a24;
      --card: #ffffff;
      --primary: oklch(0.457 0.24 277.023);
      --primary-foreground: #f5f3ff;
      --muted: #f5f5f4;
      --muted-foreground: #8b8b94;
      --border: #ebe9f1;
      --input: #ebe9f1;
      --ring: oklch(0.714 0.014 41.2);
      --destructive: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: var(--background);
      color: var(--foreground);
      line-height: 1.5;
      font-size: 85%;
      -webkit-font-smoothing: antialiased;
    }

    .layout {
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 16px;
      overflow-y: auto;
    }

    .sidebar-logo {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--primary);
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      text-decoration: none;
      color: var(--foreground);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid transparent;
    }

    .nav-item:hover {
      background: var(--muted);
    }

    .nav-item.active {
      background: var(--primary-foreground);
      color: var(--primary);
      border-color: var(--primary);
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }

    .header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .subtitle {
      color: var(--muted-foreground);
      margin: 0 0 16px;
      font-size: 0.875rem;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .form-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    label {
      font-weight: 500;
      font-size: 0.875rem;
      color: var(--foreground);
    }

    .hint-inline {
      font-weight: 400;
      color: var(--muted-foreground);
      font-size: 0.8125rem;
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
    }

    textarea {
      flex: 1;
      min-height: 96px;
      padding: 8px 12px;
      border: 1px solid var(--input);
      border-radius: 6px;
      font-size: 0.875rem;
      resize: vertical;
      font-family: inherit;
      background: var(--card);
      color: var(--foreground);
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--ring);
    }

    .status-text {
      display: block;
      margin-top: 6px;
      font-size: 0.8125rem;
      color: var(--muted-foreground);
    }

    .status-text.loading {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    button {
      color: var(--primary-foreground);
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
      white-space: nowrap;
    }

    button:hover:not(:disabled) {
      opacity: 0.9;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button.danger {
      background: #dc2626;
      color: white;
    }

    button.danger:hover:not(:disabled) {
      background: #b91c1c;
      opacity: 1;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: var(--card);
      border-radius: 10px;
      padding: 24px;
      max-width: 600px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 20px 25px rgba(0, 0, 0, 0.15);
    }

    .modal-header {
      font-size: 1.125rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-body {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-weight: 600;
      font-size: 0.875rem;
    }

    .form-group input {
      padding: 8px 12px;
      border: 1px solid var(--input);
      border-radius: 6px;
      font-size: 0.875rem;
      background: var(--card);
      color: var(--foreground);
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--ring);
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .checkbox-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-item input[type="checkbox"] {
      cursor: pointer;
      margin: 0;
    }

    .checkbox-item label {
      cursor: pointer;
      margin: 0;
      font-weight: 400;
      font-size: 0.8rem;
    }

    .modal-footer {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .summary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .summary-table thead {
      background: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .summary-table th {
      padding: 6px 10px;
      text-align: left;
      font-weight: 600;
      color: var(--muted-foreground);
      font-size: 0.8125rem;
    }

    .summary-table td {
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--foreground);
      height: 32px;
    }

    .summary-table tbody tr:hover {
      background: var(--muted);
    }

    .source-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto 1fr;
      gap: 8px;
      min-height: 300px;
    }

    .source-grid .source-block:nth-child(1) {
      grid-column: 1;
      grid-row: 1;
    }

    .source-grid .source-block:nth-child(2) {
      grid-column: 2;
      grid-row: 1 / 3;
    }

    .source-grid .source-block:nth-child(3) {
      grid-column: 1;
      grid-row: 2;
    }

    .source-grid .source-block:nth-child(4) {
      grid-column: 3;
      grid-row: 1 / 3;
    }

    .source-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
    }

    .source-heading {
      font-weight: 600;
      font-size: 0.8125rem;
      margin-bottom: 6px;
      color: var(--primary);
    }

    .kv-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    .kv-table th,
    .kv-table td {
      text-align: left;
      padding: 3px 6px;
      border-bottom: 1px solid var(--border);
      height: 24px;
    }

    .kv-table th {
      width: 35%;
      color: var(--muted-foreground);
      font-weight: 500;
      background: var(--muted);
      font-size: 0.75rem;
    }

    .kv-table td {
      color: var(--foreground);
      word-break: break-word;
      font-size: 0.8rem;
    }

    .detail-row {
      display: none;
    }

    .detail-row.open {
      display: table-row;
    }

    .detail-cell {
      padding: 0 !important;
      border-bottom: none !important;
    }

    .detail-content {
      padding: 12px;
      background: var(--muted);
      border-top: 1px solid var(--border);
    }

    .empty {
      text-align: center;
      color: var(--muted-foreground);
      padding: 24px 16px;
    }

    .header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .header-actions h2 {
      margin: 0;
      font-size: 1.1rem;
      color: var(--foreground);
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .history-table thead {
      background: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .history-table th {
      padding: 6px 10px;
      text-align: left;
      font-weight: 600;
      color: var(--muted-foreground);
      font-size: 0.8125rem;
    }

    .sortable-header {
      cursor: pointer;
      user-select: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .sortable-header:hover {
      color: var(--primary);
    }

    .sort-indicator {
      font-size: 0.75rem;
      opacity: 0.6;
      min-width: 12px;
      text-align: center;
    }

    .sort-indicator.active {
      opacity: 1;
      color: var(--primary);
    }

    .history-table td {
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--foreground);
      height: 32px;
    }

    .editable-cell {
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .editable-cell:hover {
      background: var(--muted);
    }

    .mapping-cell-inner {
      display: flex;
      align-items: flex-start;
      gap: 4px;
    }

    .reasoning-btn {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--muted-foreground);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      line-height: 16px;
      text-align: center;
      cursor: pointer;
      border: none;
      padding: 0;
      margin-top: 2px;
      opacity: 0.65;
      transition: opacity 0.15s;
    }
    .reasoning-btn:hover { opacity: 1; }

    .reasoning-popup {
      position: fixed;
      z-index: 9999;
      background: #1e1e2e;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.78rem;
      line-height: 1.55;
      max-width: 320px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      pointer-events: none;
      white-space: pre-wrap;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      display: none;
    }

    .modal-overlay.show {
      display: flex;
    }

    .combobox-modal {
      background: var(--card);
      border-radius: 10px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 25px rgba(0, 0, 0, 0.15);
    }

    .combobox-input {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.875rem;
      margin-bottom: 12px;
      background: var(--card);
      color: var(--foreground);
    }

    .combobox-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--ring);
    }

    .combobox-list {
      overflow-y: auto;
      max-height: 300px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      margin-bottom: 12px;
    }

    .combobox-item {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.875rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    .combobox-item:hover,
    .combobox-item.selected {
      background: var(--primary-foreground);
      color: var(--primary);
    }

    .combobox-item:last-child {
      border-bottom: none;
    }

    .combobox-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .save-btn {
      background: var(--primary);
      color: var(--primary-foreground);
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .save-btn:hover {
      background: oklch(0.398 0.195 277.366);
    }

    .cancel-btn {
      background: var(--muted);
      color: var(--foreground);
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }

    .table-save-btn {
      background: var(--primary);
      color: var(--primary-foreground);
      border: none;
      border-radius: 4px;
      padding: 4px 12px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      margin-left: 8px;
      transition: background 0.2s;
    }

    .table-save-btn:hover {
      background: oklch(0.398 0.195 277.366);
    }

    .table-save-btn.hidden {
      display: none;
    }

    .history-table tbody tr:last-child td {
      border-bottom: none;
    }

    .history-table tbody tr:hover {
      background: var(--muted);
    }

    .action-buttons {
      display: flex;
      gap: 6px;
    }

    .action-buttons button {
      padding: 4px 8px;
      font-size: 0.75rem;
    }

    .filter-section-wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
      padding: 16px;
      background: var(--muted);
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .filter-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 140px;
      flex: 1;
    }

    .filter-field .status-filter-group {
      width: 100%;
    }

    .filter-field .status-filter-btn {
      width: 100%;
      text-align: left;
      padding-right: 8px;
    }

    .filter-label {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--foreground);
      margin: 0;
    }

    .date-range-picker {
      position: relative;
    }

    #filterDateRange {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.875rem;
      background: var(--card);
      color: var(--foreground);
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
    }

    #filterDateRange:hover {
      border-color: #d0d0d0;
      background: #f9f9f9;
    }

    #filterDateRange:focus {
      outline: none;
      border-color: #d0d0d0;
      background: var(--card);
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
    }

    /* 간단한 Calendar Range 스타일 */
    .date-range-calendar {
      position: absolute;
      top: 100%;
      left: 0;
      background: white;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 8px;
      margin-top: 4px;
      z-index: 1000;
      min-width: 240px;
      font-size: 12px;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      padding-bottom: 4px;
    }

    .calendar-header button {
      background: none;
      border: none;
      padding: 2px 6px;
      cursor: pointer;
      font-size: 11px;
    }

    .calendar-month-title {
      font-size: 12px;
      font-weight: 500;
    }

    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 4px;
    }

    .calendar-weekday {
      text-align: center;
      font-size: 10px;
      color: #666;
      padding: 2px;
    }

    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .calendar-day {
      padding: 4px;
      text-align: center;
      cursor: pointer;
      border: 1px solid transparent;
      border-radius: 3px;
      background: transparent;
      font-size: 11px;
    }

    .calendar-day:hover {
      background: #f0f0f0;
    }

    .calendar-day.other-month {
      color: #ccc;
      cursor: default;
    }

    .calendar-day.selected {
      background: #e0e0e0;
      font-weight: bold;
    }

    .calendar-day.in-range {
      background: #f5f5f5;
    }

    .filter-section {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      padding: 12px;
      background: transparent;
      border-radius: 0;
      margin-bottom: 0;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-input {
      flex: 0 1 auto;
      min-width: 130px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.875rem;
      background: var(--card);
      color: var(--foreground);
      height: 38px;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    .filter-input::placeholder {
      color: var(--muted-foreground);
      opacity: 0.7;
    }

    .filter-input:hover {
      border-color: #d0d0d0;
      opacity: 0.9;
    }

    .filter-input:focus {
      outline: none;
      border-color: #d0d0d0;
      box-shadow: none;
      background: var(--card);
    }

    .filter-input[type="date"] {
      flex: 0 1 auto;
      min-width: 140px;
      font-family: 'Noto Sans KR', 'NanumGothic', sans-serif;
    }

    .filter-buttons {
      display: flex;
      gap: 6px;
      margin-left: 0;
    }

    .filter-buttons button {
      padding: 8px 16px;
      font-size: 0.875rem;
      height: 38px;
      flex-shrink: 0;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-weight: 500;
    }

    .filter-buttons button:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .filter-buttons button:active {
      transform: translateY(0);
    }

    .filter-separator {
      color: var(--muted-foreground);
      font-size: 0.875rem;
      opacity: 0.5;
      margin: 0 2px;
    }

    /* Status Filter Dropdown */
    .status-filter-group {
      position: relative;
      display: inline-block;
    }

    .status-filter-btn {
      background-color: #ffffff;
      color: var(--foreground);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 0.875rem;
      height: 38px;
      cursor: pointer;
      transition: border-color 0.2s ease, opacity 0.2s ease;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      position: relative;
    }

    .status-filter-btn::after {
      content: '▼';
      font-size: 0.65rem;
      flex-shrink: 0;
      margin-left: 6px;
      opacity: 0.6;
      transition: opacity 0.2s ease;
    }

    .status-filter-btn:hover::after {
      opacity: 1;
    }

    .status-filter-btn:hover {
      border-color: #d0d0d0 !important;
      background-color: #ffffff !important;
      background: #ffffff !important;
    }

    .status-filter-btn:focus {
      outline: none;
      border-color: #d0d0d0 !important;
      background-color: #ffffff !important;
      background: #ffffff !important;
    }

    .status-filter-btn:active {
      background-color: #ffffff !important;
      background: #ffffff !important;
      border-color: #d0d0d0;
    }

    .status-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      z-index: 100;
      min-width: 160px;
      margin-top: 6px;
      animation: slideDown 0.2s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .status-checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 4px 0;
    }

    .status-checkbox-group label {
      display: flex;
      align-items: center;
      gap: 0;
      cursor: pointer;
      margin: 0;
      padding: 10px 16px;
      font-size: 0.875rem;
      font-weight: 400;
      transition: opacity 0.2s ease;
      position: relative;
      background: transparent !important;
      color: var(--foreground);
      user-select: none;
    }

    .status-checkbox-group label:hover {
      background: transparent !important;
      color: var(--foreground);
    }

    .status-checkbox-group label::selection {
      background: transparent;
      color: var(--foreground);
    }

    .status-checkbox-group label.checked {
      background: var(--primary-foreground);
    }

    .status-checkbox-group input[type="checkbox"] {
      display: none;
    }

    .status-checkbox-group label::after {
      content: '';
      position: absolute;
      right: 16px;
      width: 0;
      height: 0;
      border: solid var(--foreground);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .status-checkbox-group label.checked::after {
      width: 6px;
      height: 10px;
      opacity: 1;
      border-color: var(--primary);
    }

    .status-dropdown-close-btn {
      background: var(--primary);
      color: var(--primary-foreground);
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      transition: all 0.2s ease;
    }

    .status-dropdown-close-btn:hover {
      background: oklch(0.398 0.195 277.366);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(70, 65, 218, 0.25);
    }

    .status-dropdown-close-btn:active {
      transform: translateY(0);
    }

    .status-filters-container {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .table-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      margin: 0;
    }

    .delete-btn {
      background: transparent;
      color: var(--destructive);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.15s;
    }

    .delete-btn:hover {
      background: #fee2e2;
      border-color: var(--destructive);
    }

    .toggle-btn {
      background: transparent;
      color: var(--muted-foreground);
      border: 1px solid var(--border);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: all 0.15s;
    }

    .toggle-btn:hover {

    }

    .message {

    .nav-link {

                <label>허가개시년도</label>
              </div>
              <div class="checkbox-item">
                <input type="checkbox" class="field-tele" value="lctnRnOzip" checked>
                <label>우편번호</label>
              </div>
            </div>
          </div>
        </div>

        <!-- Category Mapping Section -->
        <div style="margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border);">
          <label style="font-weight: 600; font-size: 0.875rem; display: block; margin-bottom: 12px;">업종매핑 결과</label>
          <div class="checkbox-grid">
            <div class="checkbox-item">
              <input type="checkbox" class="field-mapping" value="mct_ry_cd" checked>
              <label>가맹점업종코드</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" class="field-mapping" value="mct_ry_nm" checked>
              <label>가맹점업종명</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" class="field-mapping" value="hpsn_mct_zcd" checked>
              <label>초개인화업종코드</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" class="field-mapping" value="hpsn_mct_nm" checked>
              <label>초개인화업종명</label>
            </div>
          </div>
        </div>

        <!-- Email Input Section (Bottom) -->
        <div style="margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border);">
          <label for="emailAddress" style="font-weight: 600; font-size: 0.875rem; display: block; margin-bottom: 12px;">📧 메일 수신 주소</label>
          <input type="text" id="emailAddress" placeholder="email@example.com; email2@example.com (세미콜론으로 구분)" style="width: 100%; padding: 8px 12px; border: 1px solid var(--input); border-radius: 6px; font-size: 0.875rem; background: var(--card); color: var(--foreground);">
        </div>
      </div>

      <!-- Action Buttons (Bottom - Right Aligned) -->
      <div class="modal-footer" style="justify-content: flex-end; gap: 8px;">
        <button onclick="downloadCSV()" style="background: var(--primary); color: white;">📥 CSV 다운로드</button>
        <button onclick="sendEmail()" style="background: var(--primary); color: white;">📧 메일 발송</button>
        <button onclick="closeDataModal()" style="background: var(--muted); color: var(--foreground);">닫기</button>
      </div>
    </div>
  </div>

  <!-- 매핑사유 팝업 -->
  <div id="reasoningPopup" class="reasoning-popup" style="display:none;"></div>

  <!-- 업종 매핑 수정 모달 -->
  <div id="mappingModal" class="modal-overlay">
    <div class="combobox-modal">
      <h3 style="margin: 0 0 16px 0; font-size: 1.125rem;">업종 선택</h3>
      <input type="text" id="mappingSearchInput" class="combobox-input" placeholder="검색..." autocomplete="off">
      <div class="combobox-list" id="mappingListContainer">
        <!-- 동적 생성 -->
      </div>
      <div class="combobox-actions">
        <button class="cancel-btn" onclick="closeMappingModal()">취소</button>
      </div>
    </div>
  </div>

  <script>
    const historyTable = document.getElementById("historyTable");
    const totalCount = document.getElementById("total-count");
    const deleteOldBtn = document.getElementById("deleteOldBtn");
    let allRecords = [];
    let currentSortColumn = null;
    let currentSortAscending = true;

    // 매핑 수정용 전역 변수
    let categoryData = { mct_ry_cd: {}, hpsn_mct_zcd: {} };
    let currentEditingRecord = null;
    let currentMappingType = null; // 'mct_ry_cd' or 'hpsn_mct_zcd'

    // 통신판매업 필드 한글 매핑
    const TELECOM_FIELD_MAPPING = {
      "bzmnNm": "사업자명",
      "bzmnRgsSttusSeNm": "등록상태",
      "lctnAddr": "지번주소",
      "lctnRnAddr": "도로명주소",
      "dclrDate": "신고일자",
      "telno": "전화번호",
      "domncn": "도메인",
      "ntslMthdCn": "판매방식",
      "ntslPrdlstCn": "판매물품",
      "operSttusCdNm": "운영상태",
      "corpYnNm": "법인여부",
      "crno": "법인등록번호",
      "ctpvNm": "시도명",
      "rprsvEmladr": "대표이메일",
      "prcsDeptNm": "처리부서명",
      "prmmiYr": "허가개시년도",
      "lctnRnOzip": "우편번호"
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function getStatusDot(success, found) {
      if (!success) return '<span style="color: #999;">● 오류</span>';
      if (found) return '<span style="color: #10b981;">● 조회됨</span>';
      return '<span style="color: #999;">○ 없음</span>';
    }

    function formatDate(isoDate) {
      if (!isoDate) return "-";
      const date = new Date(isoDate);
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      const hour = String(date.getHours()).padStart(2, '0');
      const minute = String(date.getMinutes()).padStart(2, '0');
      return `${year}.${month}.${day} ${hour}:${minute}`;
    }

    function formatCellValue(value) {
      if (!value || value === "") return "";
      if (typeof value === "object") {
        const rows = Object.entries(value)
          .map(([k, v]) => `<tr><th>${escapeHtml(k)}</th><td>${escapeHtml(v)}</td></tr>`)
          .join("");
        return `<table class="kv-table"><tbody>${rows}</tbody></table>`;
      }
      return escapeHtml(value);
    }

    function renderItems(items) {
      if (!items || !items.length) return '<p class="message">정보 없음</p>';
      return items.map(item => {
        const rows = Object.entries(item)
          .map(([k, v]) => `<tr><th>${escapeHtml(k)}</th><td>${formatCellValue(v)}</td></tr>`)
          .join("");
        return `<table class="kv-table"><tbody>${rows}</tbody></table>`;
      }).join("");
    }

    function formatIndustryCategory(categoryData) {
      // 국세청산업분류 데이터를 "대분류 / 중분류 / 소분류 / 세분류 / 세세분류" 형식으로 표시
      if (!categoryData || typeof categoryData !== 'object') return '';

      const categories = [
        categoryData['대분류'],
        categoryData['중분류'],
        categoryData['소분류'],
        categoryData['세분류'],
        categoryData['세세분류']
      ];

      return categories.filter(cat => cat && cat !== '').join(' / ');
    }

    function renderCrawlBlock(source, brno) {
      let body = "";
      if (!source) {
        body = '<p class="message">조회 안 됨</p>';
      } else if (!source.success) {
        body = `<p style="color: var(--destructive);">${escapeHtml(source.error || "조회 실패")}</p>`;
      } else if (!source.found) {
        body = '<p class="message">검색 결과 없음</p>';
      } else {
        // 사업자번호 검증 (search 데이터에서 사업자번호 추출)
        if (source.search && Object.keys(source.search).length > 0) {
          const crawlBrno = (source.search.사업자번호 || source.search.bizno || "").replace(/\D/g, "");
          if (crawlBrno && crawlBrno !== brno) {
            return `
              <div class="source-block">
                <div class="source-heading crawl">Bizno 크롤링</div>
                <p class="message">조회값 없음</p>
              </div>
            `;
          }
        }

        if (source.multiple) {
          const rows = Object.entries(source.search_items?.[0] || {})
            .map(([k, v]) => `<tr><th>${escapeHtml(k)}</th><td>${escapeHtml(v)}</td></tr>`)
            .join("");
          body = rows ? `<table class="kv-table"><tbody>${rows}</tbody></table>` : '<p class="message">정보 없음</p>';
        } else {
          const searchRows = Object.entries(source.search || {})
            .map(([k, v]) => `<tr><th>${escapeHtml(k)}</th><td>${escapeHtml(v)}</td></tr>`)
            .join("");

          const detailRows = (() => {
            const rows = [];
            const detail = source.detail || {};

            // 국세청산업분류는 순서를 정렬해서 별도로 처리
            const categoryOrder = ['대분류', '중분류', '소분류', '세분류', '세세분류'];
            const industryCategory = detail['국세청산업분류'];

            if (industryCategory && typeof industryCategory === 'object') {
              categoryOrder.forEach(cat => {
                const value = industryCategory[cat];
                if (value && value !== '') {
                  rows.push(`<tr><th>국세청산업분류 - ${escapeHtml(cat)}</th><td>${escapeHtml(value)}</td></tr>`);
                }
              });
            }

            // 다른 필드들 처리
            Object.entries(detail).forEach(([k, v]) => {
              if (k !== '국세청산업분류') {
                rows.push(`<tr><th>${escapeHtml(k)}</th><td>${formatCellValue(v)}</td></tr>`);
              }
            });

            return rows.join("");
          })();
          body = (searchRows || detailRows)
            ? `<div class="sub-title">검색 결과</div><table class="kv-table"><tbody>${searchRows}</tbody></table>${detailRows ? `<div class="sub-title">상세 정보</div><table class="kv-table"><tbody>${detailRows}</tbody></table>` : ''}`
            : '<p class="message">정보 없음</p>';
        }
      }
      return `
        <div class="source-block">
          <div class="source-heading crawl">Bizno 크롤링</div>
          ${body}
        </div>
      `;
    }

    function renderFTCDetail(ftc) {
      if (!ftc) {
        return `<div class="source-block"><div class="source-heading ftc">가맹사업정보</div><p class="message">조회 안 됨</p></div>`;
      }

      if (!ftc.success) {
        return `<div class="source-block"><div class="source-heading ftc">가맹사업정보</div><p style="color: var(--destructive);">${escapeHtml(ftc.error || "조회 실패")}</p></div>`;
      }

      if (!ftc.found) {
        return `<div class="source-block"><div class="source-heading ftc">가맹사업정보</div><p class="message">검색 결과 없음</p></div>`;
      }

      const 가맹본부 = ftc.가맹본부 || {};
      const 브랜드목록 = ftc.브랜드 || [];
      const 총개수 = 브랜드목록.length;

      let 가맹본부HTML = `
        <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border);">
          <table class="kv-table" style="width: 100%;">
            <tr><th>법인명</th><td>${escapeHtml(가맹본부.법인명 || '-')}</td></tr>
            <tr><th>가맹본부관리번호</th><td>${escapeHtml(가맹본부.가맹본부관리번호 || '-')}</td></tr>
          </table>
        </div>
      `;

      let 브랜드HTML = 브랜드목록.map((b, idx) => `
        <div style="margin-bottom: 12px; padding: 8px; background: var(--muted); border-radius: 6px;">
          <div style="font-weight: 600; margin-bottom: 8px; font-size: 0.875rem; color: var(--muted-foreground);">브랜드 (${idx + 1}/${총개수}개)</div>
          <table class="kv-table" style="width: 100%; background: transparent;">
            <tr><th>브랜드관리번호</th><td>${escapeHtml(b.브랜드관리번호 || '-')}</td></tr>
            <tr><th>브랜드명</th><td>${escapeHtml(b.브랜드명 || '-')}</td></tr>
            <tr><th>산업대분류</th><td>${escapeHtml(b.산업대분류 || '-')}</td></tr>
            <tr><th>산업중분류</th><td>${escapeHtml(b.산업중분류 || '-')}</td></tr>
            <tr><th>주요상품</th><td>${escapeHtml(b.주요상품 || '-')}</td></tr>
            <tr><th>가맹개시일자</th><td>${escapeHtml(b.가맹개시일자 || '-')}</td></tr>
          </table>
        </div>
      `).join('');

      return `
        <div class="source-block">
          <div class="source-heading ftc">가맹사업정보</div>
          ${가맹본부HTML}
          ${브랜드HTML}
        </div>
      `;
    }

    function renderSourceBlock(title, source, className, brno) {
      let body = "";
      if (!source) {
        body = '<p class="message">조회 안 됨</p>';
      } else if (!source.success) {
        body = `<p style="color: var(--destructive);">${escapeHtml(source.error || "조회 실패")}</p>`;
      } else if (!source.found) {
        body = '<p class="message">검색 결과 없음</p>';
      } else if (className === "api" && source.items) {
        // Bizno API: 사업자번호 일치 검증
        const matchedItems = source.items.filter(item => {
          const itemBrno = (item.사업자등록번호 || item.bizno || "").replace(/\D/g, "");
          return itemBrno === brno;
        });

        if (matchedItems.length > 0) {
          body = renderItems(matchedItems);
        } else {
          body = '<p class="message">조회값 없음</p>';
        }
      } else if (className === "gov" && source.items) {
        // 통신판매업: 영문 필드명을 한글로 매핑
        const mappedItems = source.items.map(item => {
          const mappedItem = {};
          Object.entries(item).forEach(([key, value]) => {
            const korKey = TELECOM_FIELD_MAPPING[key] || key;
            mappedItem[korKey] = value;
          });
          return mappedItem;
        });
        body = renderItems(mappedItems);
      } else {
        body = renderItems(source.items);
      }
      return `
        <div class="source-block">
          <div class="source-heading ${className}">${escapeHtml(title)}</div>
          ${body}
        </div>
      `;
    }

    function renderHistoryRow(record, index) {
      const api = record.api;
      const crawl = record.crawl;
      const ftc = record.ftc;
      const mapping = record.mapping || {};
      const biznoResult = getStatusDot(api.bizno?.success, api.bizno?.found);
      const crawlResult = getStatusDot(crawl?.success, crawl?.found);
      const govResult = getStatusDot(api.gov?.success, api.gov?.found);
      const ftcResult = getStatusDot(ftc?.success, ftc?.found);

      // 매핑 결과 렌더링
      const reasoning = mapping.reasoning || '';
      const hasMappingData = !!(mapping.mct_ry_cd || mapping.hpsn_mct_zcd);
      const reasoningText = reasoning || (hasMappingData ? '사유 없음' : '');
      const reasoningBtn = reasoningText
        ? `<button class="reasoning-btn" data-reasoning="${escapeHtml(reasoningText)}" onclick="event.stopPropagation();showReasoningFromBtn(event,this)" title="매핑사유">?</button>`
        : '';

      let mctDisplay = '<span style="color: var(--muted-foreground);">없음</span>';
      if (mapping.mct_ry_cd && typeof mapping.mct_ry_cd === 'object' && mapping.mct_ry_cd.code) {
        mctDisplay = `<div class="mapping-cell-inner"><div style="font-size: 0.8rem;">${escapeHtml(mapping.mct_ry_cd.code)}<br><span style="color: var(--muted-foreground);">${escapeHtml(mapping.mct_ry_cd.name)}</span></div>${reasoningBtn}</div>`;
      }

      let hpsn_mct_zcdDisplay = '<span style="color: var(--muted-foreground);">없음</span>';
      if (mapping.hpsn_mct_zcd && typeof mapping.hpsn_mct_zcd === 'object' && mapping.hpsn_mct_zcd.code) {
        hpsn_mct_zcdDisplay = `<div class="mapping-cell-inner"><div style="font-size: 0.8rem;">${escapeHtml(mapping.hpsn_mct_zcd.code)}<br><span style="color: var(--muted-foreground);">${escapeHtml(mapping.hpsn_mct_zcd.name)}</span></div></div>`;
      }

      // 저장 버튼 표시 여부 (수정된 record만)
      const isModified = modifiedRecords.has(record.id);
      const saveButtonHtml = isModified ? `<button class="table-save-btn" onclick="saveMapping(${record.id})">[저장]</button>` : '';

      return `
        <tr data-id="${record.id || index}" class="history-row">
          <td style="text-align: center;">
            <input type="checkbox" class="table-checkbox row-checkbox" data-record-id="${record.id || index}" onchange="updateSelectAllCheckbox()">
          </td>
          <td>${escapeHtml(record.brno_formatted)}</td>
          <td>${record.company_name ? escapeHtml(record.company_name) : '-'}</td>
          <td>${formatDate(record.query_date)}</td>
          <td>${biznoResult}</td>
          <td>${crawlResult}</td>
          <td>${govResult}</td>
          <td>${ftcResult}</td>
          <td class="editable-cell" onclick="openMappingModal(${record.id}, 'mct_ry_cd')" title="클릭하여 편집">${mctDisplay}</td>
          <td class="editable-cell" onclick="openMappingModal(${record.id}, 'hpsn_mct_zcd')" title="클릭하여 편집">${hpsn_mct_zcdDisplay}</td>
          <td style="text-align: center;">
            <div class="action-buttons">
              <button class="toggle-btn" data-index="${index}">▼</button>
              ${saveButtonHtml}
              <button class="delete-btn" onclick="deleteRecord(${record.id || index})" title="삭제">🗑️</button>
            </div>
          </td>
        </tr>
        <tr class="detail-row" data-index="${index}">
          <td colspan="11" class="detail-cell">
            <div class="detail-content">
              <div class="source-grid">
                ${renderSourceBlock("Bizno API", api.bizno, "api", record.brno)}
                ${renderSourceBlock("통신판매업", api.gov, "gov")}
                ${renderCrawlBlock(crawl, record.brno)}
                ${renderFTCDetail(ftc)}
              </div>
            </div>
          </td>
        </tr>
      `;
    }

    async function loadHistory() {
      try {
        const response = await fetch("/api/history");
        const data = await response.json();

        if (!data.success) {
          console.error("이력 로드 실패:", data.error);
          return;
        }

        allRecords = data.records || [];
        totalCount.textContent = allRecords.length;

        const tbody = historyTable.querySelector("tbody");
        if (allRecords.length === 0) {
          tbody.innerHTML = '<tr id="emptyMessage"><td colspan="11" class="message">이력이 없습니다.</td></tr>';
          document.getElementById('filtered-count').textContent = 0;
          return;
        }

        tbody.innerHTML = allRecords.map(renderHistoryRow).join("");
        attachToggleListeners();

        // 모든 행을 표시하고 카운트 업데이트
        const rows = document.querySelectorAll('.history-row');
        rows.forEach(row => {
          row.style.display = '';
        });
        updateFilteredCount();

        // 필터 입력 필드만 초기화 (체크박스는 건드리지 않음)
        document.getElementById('filterBrno').value = '';
        document.getElementById('filterCompany').value = '';
        document.getElementById('filterDateRange').value = '';
        document.getElementById('filterDateFrom').value = '';
        document.getElementById('filterDateTo').value = '';
      } catch (error) {
        console.error("이력 로드 에러:", error);
      }
    }

    function attachToggleListeners() {
      document.querySelectorAll(".toggle-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          const idx = btn.getAttribute("data-index");
          const detailRow = document.querySelector(`.detail-row[data-index="${idx}"]`);
          if (detailRow) {
            detailRow.classList.toggle("open");
            btn.textContent = detailRow.classList.contains("open") ? "▲" : "▼";
          }
        });
      });
    }

    // 매핑 모달 함수들
    async function openMappingModal(recordId, mappingType) {
      currentEditingRecord = allRecords.find(r => r.id === recordId);
      if (!currentEditingRecord) return;

      currentMappingType = mappingType;

      // 카테고리 데이터가 없으면 로드
      if (Object.keys(categoryData.mct_ry_cd).length === 0) {
        try {
          const response = await fetch("/api/categories");
          const data = await response.json();
          if (data.success) {
            categoryData = {
              mct_ry_cd: data.mct_ry_cd || {},
              hpsn_mct_zcd: data.hpsn_mct_zcd || {}
            };
          }
        } catch (error) {
          console.error("카테고리 데이터 로드 실패:", error);
          alert("카테고리 데이터를 로드할 수 없습니다.");
          return;
        }
      }

      // 모달 표시
      const modal = document.getElementById("mappingModal");
      const searchInput = document.getElementById("mappingSearchInput");
      modal.classList.add("show");
      searchInput.value = "";
      searchInput.focus();

      // 카테고리 리스트 렌더링
      loadCategoriesForModal();

      // 검색 이벤트 리스너
      searchInput.removeEventListener("input", filterMappingListHandler);
      searchInput.addEventListener("input", filterMappingListHandler);
    }

    function closeMappingModal() {
      const modal = document.getElementById("mappingModal");
      modal.classList.remove("show");
      const searchInput = document.getElementById("mappingSearchInput");
      searchInput.value = "";
      searchInput.removeEventListener("input", filterMappingListHandler);
    }

    // ── 매핑사유 팝업 ──
    function showReasoningFromBtn(event, btn) {

    function showReasoningPopup(event, text) {

    function loadCategoriesForModal() {
      const categories = categoryData[currentMappingType] || {};
      const container = document.getElementById("mappingListContainer");

      let html = "";
      for (const code in categories) {
        const name = categories[code];
        html += `<div class="combobox-item" onclick="selectMappingItem('${code}', '${escapeHtml(name)}')">${escapeHtml(code)} - ${escapeHtml(name)}</div>`;
      }

      container.innerHTML = html;
    }

    function filterMappingList(searchText) {
      const categories = categoryData[currentMappingType] || {};
      const container = document.getElementById("mappingListContainer");
      const searchLower = searchText.toLowerCase();

      let html = "";
      for (const code in categories) {
        const name = categories[code];
        const codeLower = code.toLowerCase();
        const nameLower = name.toLowerCase();

        // 코드 또는 명칭에 검색어 포함
        if (codeLower.includes(searchLower) || nameLower.includes(searchLower)) {
          html += `<div class="combobox-item" onclick="selectMappingItem('${code}', '${escapeHtml(name)}')">${escapeHtml(code)} - ${escapeHtml(name)}</div>`;
        }
      }

      if (html === "") {
        html = '<div style="padding: 12px; color: var(--muted-foreground);">검색 결과가 없습니다.</div>';
      }

      container.innerHTML = html;
    }

    function selectMappingItem(code, name) {
      if (currentEditingRecord && currentMappingType) {
        saveMappingSelection(code, name);
      }
    }

    function saveMappingSelection(code, name) {
      const confirmed = window.confirm("해당 변경사항을 저장하겠습니까?");
      if (confirmed) {
        saveMappingToServer(currentEditingRecord.id, code, name);
      }
    }

    async function saveMappingToServer(recordId, code, name) {
      try {
        const mappingData = {};
        mappingData[currentMappingType] = { code, name };

        const response = await fetch("/api/update-mapping", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            record_id: recordId,
            [currentMappingType]: { code, name }
          })
        });

        const data = await response.json();
        if (data.success) {
          // 해당 레코드 업데이트
          const record = allRecords.find(r => r.id === recordId);
          if (record) {
            if (!record.mapping) record.mapping = {};
            record.mapping[currentMappingType] = { code, name };
            record.mapping.reasoning = '[사용자 수기입력건]';

            // 테이블 셀 업데이트
            const row = document.querySelector(`tr[data-id="${recordId}"]`);
            if (row) {
              const cellIndex = currentMappingType === 'mct_ry_cd' ? 8 : 9;
              const cell = row.cells[cellIndex];
              const rBtn = `<button class="reasoning-btn" data-reasoning="[사용자 수기입력건]" onclick="event.stopPropagation();showReasoningFromBtn(event,this)" title="매핑사유">?</button>`;
              if (cell) {
                cell.innerHTML = `<div class="mapping-cell-inner"><div style="font-size: 0.8rem;">${escapeHtml(code)}<br><span style="color: var(--muted-foreground);">${escapeHtml(name)}</span></div>${rBtn}</div>`;
              }
            }
          }

          closeMappingModal();
        } else {
          alert("업종 매핑 저장 실패: " + data.error);
        }
      } catch (error) {
        console.error("업종 매핑 저장 에러:", error);
        alert("업종 매핑 저장 중 오류가 발생했습니다.");
      }
    }

    function getStatusValueFromData(success, found) {
      if (success === false) return 0; // 오류 (가장 낮음)
      if (success && found) return 2; // 조회됨 (가장 높음)
      if (success && !found) return 1; // 없음 (중간)
      return -1;
    }

    function compareHistoryValues(a, b, columnName) {
      if (columnName === 'brno_formatted') {
        // 사업자번호: 숫자 정렬
        const numA = parseInt(String(a || "").replace(/\D/g, "")) || 0;
        const numB = parseInt(String(b || "").replace(/\D/g, "")) || 0;
        return numA - numB;
      } else if (columnName === 'company_name') {
        // 상호명: 문자 정렬 (한글 기준)
        const strA = String(a || "");
        const strB = String(b || "");
        return strA.localeCompare(strB, 'ko');
      } else if (columnName === 'query_date') {
        // 날짜: ISO 형식 정렬
        const dateA = new Date(a || 0).getTime();
        const dateB = new Date(b || 0).getTime();
        return dateA - dateB;
      }
      return 0;
    }

    function getStatusValue(success, found) {
      if (success === false) return "오류";
      if (success && found) return "조회됨";
      if (success && !found) return "없음";
      return "";
    }

    function sortHistoryTable(columnName, event) {
      event.stopPropagation();

      // 같은 컬럼을 다시 클릭하면 방향 반대로
      if (currentSortColumn === columnName) {
        currentSortAscending = !currentSortAscending;
      } else {
        currentSortColumn = columnName;
        currentSortAscending = true;
      }

      // 정렬 수행
      let sortedRecords = [...allRecords];

      if (['bizno_status', 'crawl_status', 'gov_status', 'ftc_status', 'mct_ry_cd_status', 'hpsn_mct_zcd_status'].includes(columnName)) {
        // 상태 컬럼 정렬
        sortedRecords.sort((a, b) => {
          let statusA, statusB;

          if (columnName === 'bizno_status') {
            statusA = getStatusValueFromData(a.api?.bizno?.success, a.api?.bizno?.found);
            statusB = getStatusValueFromData(b.api?.bizno?.success, b.api?.bizno?.found);
          } else if (columnName === 'crawl_status') {
            statusA = getStatusValueFromData(a.crawl?.success, a.crawl?.found);
            statusB = getStatusValueFromData(b.crawl?.success, b.crawl?.found);
          } else if (columnName === 'gov_status') {
            statusA = getStatusValueFromData(a.api?.gov?.success, a.api?.gov?.found);
            statusB = getStatusValueFromData(b.api?.gov?.success, b.api?.gov?.found);
          } else if (columnName === 'ftc_status') {
            statusA = getStatusValueFromData(a.ftc?.success, a.ftc?.found);
            statusB = getStatusValueFromData(b.ftc?.success, b.ftc?.found);
          } else if (columnName === 'mct_ry_cd_status') {
            // 매핑 결과가 있으면 1, 없으면 0
            statusA = a.mapping?.mct_ry_cd?.code ? 1 : 0;
            statusB = b.mapping?.mct_ry_cd?.code ? 1 : 0;
          } else if (columnName === 'hpsn_mct_zcd_status') {
            statusA = a.mapping?.hpsn_mct_zcd?.code ? 1 : 0;
            statusB = b.mapping?.hpsn_mct_zcd?.code ? 1 : 0;
          }

          return currentSortAscending ? statusA - statusB : statusB - statusA;
        });
      } else {
        // 일반 컬럼 정렬
        sortedRecords.sort((a, b) => {
          const valA = a[columnName];
          const valB = b[columnName];
          const cmp = compareHistoryValues(valA, valB, columnName);
          return currentSortAscending ? cmp : -cmp;
        });
      }

      allRecords = sortedRecords;

      // 정렬 지시자 업데이트
      document.querySelectorAll('.sort-indicator').forEach(indicator => {
        indicator.classList.remove('active');
        indicator.textContent = '';
      });

      const activeIndicator = document.querySelector(`.sort-indicator[data-column="${columnName}"]`);
      if (activeIndicator) {
        activeIndicator.classList.add('active');
        activeIndicator.textContent = currentSortAscending ? '▲' : '▼';
      }

      // 테이블 다시 렌더링
      const tbody = historyTable.querySelector("tbody");
      if (allRecords.length === 0) {
        tbody.innerHTML = '<tr id="emptyMessage"><td colspan="11" class="message">이력이 없습니다.</td></tr>';
        return;
      }

      tbody.innerHTML = allRecords.map((record, index) => renderHistoryRow(record, index)).join("");
      attachToggleListeners();
      resetFilters();
    }

    function filterHistory() {
      // 사업자번호에서 하이픈/공백 제거
      const brnoTextFilter = document.getElementById('filterBrno').value.trim().replace(/\D/g, '');
      const companyFilter = document.getElementById('filterCompany').value.toLowerCase().trim();
      const dateFromFilter = document.getElementById('filterDateFrom').value;
      const dateToFilter = document.getElementById('filterDateTo').value;

      // Get selected statuses for each source (dropdown-based)
      const biznoStatuses = getSelectedStatusesForSource('bizno');
      const crawlStatuses = getSelectedStatusesForSource('crawl');
      const govStatuses = getSelectedStatusesForSource('gov');
      const ftcStatuses = getSelectedStatusesForSource('ftc');

      const rows = document.querySelectorAll('.history-row');

      rows.forEach((row, index) => {
        const cells = row.querySelectorAll('td');
        if (cells.length < 2) return;

        // 사업자번호: 하이픈 제거하여 비교
        const brno = cells[1].textContent.trim().replace(/\D/g, '');
        const company = cells[2].textContent.trim().toLowerCase();
        const dateStr = cells[3].textContent.trim();
        const biznoStatusCell = cells[4].textContent.trim();
        const crawlStatusCell = cells[5].textContent.trim();
        const govStatusCell = cells[6].textContent.trim();
        const ftcStatusCell = cells[7].textContent.trim();
        const mctCell = cells[8].textContent.trim().toLowerCase();
        const hpsn_mct_zcdCell = cells[9].textContent.trim().toLowerCase();

        // 날짜 파싱 (예: "2025. 6. 15. 오후 2:30")
        const dateMatch = dateStr.match(/(\d{4})\.\s+(\d{1,2})\.\s+(\d{1,2})/);
        const rowDate = dateMatch ? new Date(dateMatch[1], dateMatch[2] - 1, dateMatch[3]) : null;

        let matches = true;

        // 기존 필터
        if (brnoTextFilter && !brno.includes(brnoTextFilter)) {
          matches = false;
        }

        if (companyFilter && !company.includes(companyFilter)) {
          matches = false;
        }

        if (dateFromFilter) {
          const fromDate = new Date(dateFromFilter);
          if (rowDate && rowDate < fromDate) {
            matches = false;
          }
        }

        if (dateToFilter) {
          const toDate = new Date(dateToFilter);
          toDate.setHours(23, 59, 59, 999);
          if (rowDate && rowDate > toDate) {
            matches = false;
          }
        }

        // 상태 필터 - 체크박스 기반 (선택된 상태가 있으면 그 중 하나와 매치해야함)
        if (biznoStatuses.length > 0) {
          const cellStatus = getStatusFromCellText(biznoStatusCell);
          if (!biznoStatuses.includes(cellStatus)) {
            matches = false;
          }
        }

        if (crawlStatuses.length > 0) {
          const cellStatus = getStatusFromCellText(crawlStatusCell);
          if (!crawlStatuses.includes(cellStatus)) {
            matches = false;
          }
        }

        if (govStatuses.length > 0) {
          const cellStatus = getStatusFromCellText(govStatusCell);
          if (!govStatuses.includes(cellStatus)) {
            matches = false;
          }
        }

        if (ftcStatuses.length > 0) {
          const cellStatus = getStatusFromCellText(ftcStatusCell);
          if (!ftcStatuses.includes(cellStatus)) {
            matches = false;
          }
        }

        row.style.display = matches ? '' : 'none';
      });

      updateFilteredCount();
    }

    function getStatusFromCellText(cellText) {
      if (cellText.includes('오류')) return '오류';
      if (cellText.includes('조회됨')) return '조회됨';
      if (cellText.includes('없음')) return '없음';
      return '';
    }

    function resetFilters() {
      document.getElementById('filterBrno').value = '';
      document.getElementById('filterCompany').value = '';
      document.getElementById('filterDateFrom').value = '';
      document.getElementById('filterDateTo').value = '';

      // Reset status checkboxes without triggering onchange
      const checkboxes = document.querySelectorAll('.bizno-status, .crawl-status, .gov-status, .ftc-status');
      checkboxes.forEach(cb => {
        // 임시로 onchange 제거
        const onchangeHandler = cb.onchange;
        cb.onchange = null;
        cb.checked = false;
        // onchange 복원
        cb.onchange = onchangeHandler;
      });

      // Update all labels to "모두"
      document.getElementById('bizno-label').textContent = '모두';
      document.getElementById('crawl-label').textContent = '모두';
      document.getElementById('gov-label').textContent = '모두';
      document.getElementById('ftc-label').textContent = '모두';

      // Close all dropdowns
      document.querySelectorAll('.status-dropdown').forEach(d => {
        d.style.display = 'none';
      });

      document.getElementById('selectAllCheckbox').checked = false;

        tele_fields: teleFields,
        crawl_fields: crawlFields,
        exclude_errors: excludeErrors
      }));
    }

    function restoreDataPreferences() {
      const saved = localStorage.getItem('dataPreferences');
      if (saved) {
        const prefs = JSON.parse(saved);
        document.querySelectorAll('.field-bizno').forEach(cb => {
          cb.checked = prefs.bizno_fields && prefs.bizno_fields.includes(cb.value);
        });
        document.querySelectorAll('.field-tele').forEach(cb => {
          cb.checked = prefs.tele_fields && prefs.tele_fields.includes(cb.value);
        });
        document.querySelectorAll('.field-crawl').forEach(cb => {
          cb.checked = prefs.crawl_fields && prefs.crawl_fields.includes(cb.value);
        });
        const excludeErrorsCheckbox = document.getElementById('excludeErrors');
        if (excludeErrorsCheckbox) {
          excludeErrorsCheckbox.checked = prefs.exclude_errors || false;
        }
        updateModalCheckboxStates('bizno');
        updateModalCheckboxStates('tele');
        updateModalCheckboxStates('crawl');
      }
    }

      const checkboxes = document.querySelectorAll(`.field-${type}`);
      const allCheckbox = document.getElementById(`${type}_all`);

        const checkedCount = Array.from(checkboxes).filter(cb => cb.checked).length;
        allCheckbox.checked = checkedCount === checkboxes.length && checkboxes.length > 0;
        allCheckbox.indeterminate = checkedCount > 0 && checkedCount < checkboxes.length;

    }

    async function downloadCSV() {
      const biznoFields = Array.from(document.querySelectorAll('.field-bizno:checked')).map(cb => cb.value);
      const teleFields = Array.from(document.querySelectorAll('.field-tele:checked')).map(cb => cb.value);
      const crawlFields = Array.from(document.querySelectorAll('.field-crawl:checked')).map(cb => cb.value);
      const mappingFields = Array.from(document.querySelectorAll('.field-mapping:checked')).map(cb => cb.value);
      const excludeErrors = document.getElementById('excludeErrors').checked;

      if (biznoFields.length === 0 && teleFields.length === 0 && crawlFields.length === 0 && mappingFields.length === 0) {
        alert('선택된 필드가 없습니다.');
        return;
      }

      let dataToDownload = allRecords;

      if (excludeErrors) {
        dataToDownload = allRecords.filter(record => {
          const biznoSuccess = record.api?.bizno?.success !== false;
          const govSuccess = record.api?.gov?.success !== false;
          const crawlSuccess = record.crawl?.success !== false;
          return biznoSuccess || govSuccess || crawlSuccess;
        });

        if (dataToDownload.length === 0) {
          alert('오류를 제외하면 다운로드할 데이터가 없습니다.');
          return;
        }
      }

      try {
        const response = await fetch('/api/generate-csv', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            data: dataToDownload,
            bizno_fields: biznoFields,
            tele_fields: teleFields,
            crawl_fields: crawlFields,
            mapping_fields: mappingFields
          })
        });

        if (!response.ok) {
          alert('CSV 생성 실패: ' + response.statusText);
          return;
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `business_lookup_${new Date().getTime()}.csv`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);

        saveDataPreferences();
        alert('CSV 다운로드 완료');
      } catch (error) {
        alert('오류가 발생했습니다: ' + error.message);
      }
    }

    async function sendEmail() {
      const emailInput = document.getElementById('emailAddress').value.trim();
      if (!emailInput) {
        alert('메일 주소를 입력해주세요.');
        return;
      }

      const emails = emailInput.split(';')
        .map(e => e.trim())
        .filter(e => e.length > 0 && e.includes('@'));

      if (emails.length === 0) {
        alert('유효한 메일 주소가 없습니다.');
        return;
      }

      const biznoFields = Array.from(document.querySelectorAll('.field-bizno:checked')).map(cb => cb.value);
      const teleFields = Array.from(document.querySelectorAll('.field-tele:checked')).map(cb => cb.value);
      const crawlFields = Array.from(document.querySelectorAll('.field-crawl:checked')).map(cb => cb.value);
      const mappingFields = Array.from(document.querySelectorAll('.field-mapping:checked')).map(cb => cb.value);
      const excludeErrors = document.getElementById('excludeErrors').checked;

      if (biznoFields.length === 0 && teleFields.length === 0 && crawlFields.length === 0 && mappingFields.length === 0) {
        alert('선택된 필드가 없습니다.');
        return;
      }

      let dataToSend = allRecords;

      if (excludeErrors) {
        dataToSend = allRecords.filter(record => {
          const biznoSuccess = record.api?.bizno?.success !== false;
          const govSuccess = record.api?.gov?.success !== false;
          const crawlSuccess = record.crawl?.success !== false;
          return biznoSuccess || govSuccess || crawlSuccess;
        });

        if (dataToSend.length === 0) {
          alert('오류를 제외하면 발송할 데이터가 없습니다.');
          return;
        }
      }

      try {
        let successCount = 0;
        let failCount = 0;

        for (const email of emails) {
          const response = await fetch('/api/send-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: email,
              data: dataToSend,
              bizno_fields: biznoFields,
              tele_fields: teleFields,
              crawl_fields: crawlFields,
              mapping_fields: mappingFields
            })
          });

          const result = await response.json();
          if (result.success) {
            successCount++;
          } else {
            failCount++;
            console.error(`${email} 발송 실패:`, result.error);
          }
        }

        saveDataPreferences();

        if (failCount === 0) {
          alert(`메일이 발송되었습니다.\n총 ${successCount}명에게 ${dataToSend.length}건 데이터 발송 완료`);
        } else {
          alert(`메일 발송 결과\n성공: ${successCount}명\n실패: ${failCount}명`);
        }
        closeDataModal();
      } catch (error) {
        alert('오류가 발생했습니다: ' + error.message);
      }
    }

    // 필터 입력 필드 엔터 키 이벤트
    ['filterBrno', 'filterCompany', 'filterDateFrom', 'filterDateTo'].forEach(id => {
      const element = document.getElementById(id);
      if (element) {
        element.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            filterHistory();
          }
        });
      }
    });

    // 드롭다운 토글 함수
    function toggleStatusDropdown(source) {
      const dropdown = document.getElementById(`${source}-dropdown`);
      const isOpen = dropdown.style.display !== 'none';

      // 모든 드롭다운 닫기
      document.querySelectorAll('.status-dropdown').forEach(d => {
        d.style.display = 'none';
      });

      // 클릭한 드롭다운 열기
      if (!isOpen) {
        dropdown.style.display = 'block';
      }
    }

    // 드롭다운 닫기 함수
    function closeStatusDropdown(source) {
      document.getElementById(`${source}-dropdown`).style.display = 'none';
    }

    // 버튼 레이블 업데이트 함수
    function updateStatusLabel(source) {
      const checkboxes = document.querySelectorAll(`.${source}-status`);
      const checkedCount = Array.from(checkboxes).filter(cb => cb.checked).length;
      const label = document.getElementById(`${source}-label`);

      if (checkedCount === 0) {
        label.textContent = '모두';
      } else {
        label.textContent = `${checkedCount}개 선택`;
      }

      // 체크박스 label에 'checked' 클래스 추가/제거
      const dropdown = document.getElementById(`${source}-dropdown`);
      if (dropdown) {
        dropdown.querySelectorAll('label').forEach((lbl, idx) => {
          const checkbox = checkboxes[idx];
          if (checkbox && checkbox.checked) {
            lbl.classList.add('checked');
          } else {
            lbl.classList.remove('checked');
          }
        });
      }
    }

    // 선택된 상태값 가져오기 함수 (수정됨)
    function getSelectedStatusesForSource(source) {
      const checkboxes = document.querySelectorAll(`.${source}-status:checked`);
      return Array.from(checkboxes).map(cb => cb.value);
    }

    // Date Range Picker
    let selectedFromDate = null;
    let selectedToDate = null;
    let isSelectingRange = false;

    const filterDateRangeInput = document.getElementById('filterDateRange');
    const dateRangeCalendar = document.getElementById('dateRangeCalendar');
    const filterDateFromInput = document.getElementById('filterDateFrom');
    const filterDateToInput = document.getElementById('filterDateTo');

    function formatDate(date) {
      if (!date) return '';
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function updateDateRangeDisplay() {
      if (selectedFromDate && selectedToDate) {
        filterDateRangeInput.value = `${formatDate(selectedFromDate)} ~ ${formatDate(selectedToDate)}`;
        filterDateFromInput.value = formatDate(selectedFromDate);
        filterDateToInput.value = formatDate(selectedToDate);
      } else if (selectedFromDate) {
        filterDateRangeInput.value = `${formatDate(selectedFromDate)} ~ `;
      } else {
        filterDateRangeInput.value = '';
      }
    }

    function renderCalendar() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();

      let html = '<div class="calendar-header">';
      html += '<button onclick="document.getElementById(\'dateRangeCalendar\').style.display=\'none\'">닫기</button>';
      html += `<div class="calendar-month-title">${year}년 ${month + 1}월</div>`;
      html += '</div>';

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startDate = new Date(firstDay);
      startDate.setDate(startDate.getDate() - firstDay.getDay());

      html += '<div class="calendar-weekdays">';
      ['일', '월', '화', '수', '목', '금', '토'].forEach(day => {
        html += `<div class="calendar-weekday">${day}</div>`;
      });
      html += '</div>';

      html += '<div class="calendar-days">';
      const currentDate = new Date(startDate);
      for (let i = 0; i < 42; i++) {
        const isOtherMonth = currentDate.getMonth() !== month;
        const isToday = currentDate.toDateString() === new Date().toDateString();
        const dateStr = formatDate(currentDate);
        const isSelected = (selectedFromDate && selectedToDate &&
          currentDate >= selectedFromDate && currentDate <= selectedToDate);
        const isStart = selectedFromDate && currentDate.toDateString() === selectedFromDate.toDateString();
        const isEnd = selectedToDate && currentDate.toDateString() === selectedToDate.toDateString();

        let classes = 'calendar-day';
        if (isOtherMonth) classes += ' other-month';
        if (isSelected && !isStart && !isEnd) classes += ' in-range';
        if (isStart || isEnd) classes += ' range-start range-end';
        if (isToday) classes += ' today';

        html += `<button class="${classes}" onclick="selectDate('${dateStr}')">${currentDate.getDate()}</button>`;
        currentDate.setDate(currentDate.getDate() + 1);
      }
      html += '</div>';

      dateRangeCalendar.innerHTML = html;
    }

    function selectDate(dateStr) {
      const selectedDate = new Date(dateStr + 'T00:00:00');
      if (!selectedFromDate) {
        selectedFromDate = selectedDate;
      } else if (!selectedToDate) {
        if (selectedDate < selectedFromDate) {
          selectedToDate = selectedFromDate;
          selectedFromDate = selectedDate;
        } else {
          selectedToDate = selectedDate;
        }
        dateRangeCalendar.style.display = 'none';
        filterHistory();
      } else {
        selectedFromDate = selectedDate;
        selectedToDate = null;
      }
      updateDateRangeDisplay();
      renderCalendar();
    }

    filterDateRangeInput.addEventListener('click', () => {
      dateRangeCalendar.style.display = dateRangeCalendar.style.display === 'none' ? 'block' : 'none';
      if (dateRangeCalendar.style.display === 'block') {
        renderCalendar();
      }
    });

    document.addEventListener('click', (e) => {
      if (!filterDateRangeInput.contains(e.target) && !dateRangeCalendar.contains(e.target)) {
        dateRangeCalendar.style.display = 'none';
      }
    });

    // 페이지 로드 시 이력 불러오기
    loadHistory();

    // 드롭다운 외부 클릭 시 닫기
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.status-filter-group')) {
        document.querySelectorAll('.status-dropdown').forEach(d => {
          d.style.display = 'none';
        });
      }
    });
  </script>
</body>
</html>
